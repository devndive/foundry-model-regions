name: Deploy matrix web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

# Stage 1: regenerate the normalized JSON artifacts from the committed cache
      - name: Regenerate normalized artifacts
        run: |
          pnpm --filter @foundry/pipeline emit-models
          pnpm --filter @foundry/pipeline emit-region-metadata
          pnpm --filter @foundry/pipeline emit-features

      - name: Sync artifacts into the web app's served directory
        run: pnpm sync-data

# Stage 2: build the static SPA
      - name: Type-check SPA
        run: pnpm --filter @foundry/web typecheck

      - name: Build SPA
        run: pnpm --filter @foundry/web build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
