name: Feature availability drift check

on:
  schedule:
    # Weekly, Monday 07:00 UTC. The articles change without notice; a weekly
    # cadence keeps repo churn near zero while catching drift promptly.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: feature-drift-check
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check feature articles for drift
        run: pnpm --filter @foundry/pipeline check-feature-drift

      # Stage 1: a new snapshot directory literally means "drift happened" — commit
      # only the new snapshots, never feature-metadata.ts (humans own correctness).
      - name: Commit new snapshots
        run: |
          if [ -n "$(git status --porcelain packages/pipeline/cache/features)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add packages/pipeline/cache/features
            git commit -m "chore: snapshot feature article drift ($(date -u +%Y-%m-%dT%H-%M-%SZ))"
            git push
          else
            echo "No snapshot changes to commit."
          fi

      # Stage 2: feed the existing triage workflow — one needs-triage issue per
      # drift event (changed sections and vanished anchors), with the diff inline.
      - name: Open triage issues for drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create needs-triage --color FBCA04 \
            --description "Maintainer needs to evaluate this issue" 2>/dev/null || true
          count=$(jq '[.[] | select(.opensIssue)] | length' packages/pipeline/drift-report.json)
          echo "Opening $count triage issue(s)."
          for i in $(jq -r 'to_entries[] | select(.value.opensIssue) | .key' packages/pipeline/drift-report.json); do
            title=$(jq -r ".[$i].issueTitle" packages/pipeline/drift-report.json)
            jq -r ".[$i].issueBody" packages/pipeline/drift-report.json > /tmp/drift-body.md
            gh issue create --title "$title" --body-file /tmp/drift-body.md --label needs-triage
          done

      # Stage 3: a vanished anchor is a valid drift signal — surface it loudly so a
      # silent restructure of the article can't slip past unnoticed.
      - name: Fail loudly on unresolved anchors
        run: |
          if jq -e 'any(.[]; .status == "anchor-missing")' packages/pipeline/drift-report.json >/dev/null; then
            echo "::error::One or more feature section anchors no longer resolve."
            jq -r '.[] | select(.status == "anchor-missing") | "  - \(.featureId): \(.sourceUrl)#\(.sectionAnchor)"' packages/pipeline/drift-report.json
            exit 1
          fi
