name: Daily model-cache refresh

on:
  schedule:
    # Daily at 06:00 UTC. Keeps the model-availability cache fresh automatically.
    # The Azure ARM API can return models and SKUs in varying order, so we use
    # check-model-drift to detect only real changes, not incidental re-ordering.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  # Required for `gh workflow run deploy-pages.yml` (workflow_dispatch API).
  actions: write

concurrency:
  group: refresh-model-cache
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure (OIDC)
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # fetch-models exits non-zero if ANY region errors, which fails this step
      # and aborts the job before any commit — a partial dataset is never published.
      - name: Fetch fresh model snapshot
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: npm run fetch-models

      # check-model-drift signals via exit code: 0 = unchanged, 1 = changed
      # (incl. a new baseline), 2 = usage error / no snapshot. Capture it
      # explicitly so the commit step can branch on a real value.
      - name: Check for model availability changes
        id: check_drift
        run: |
          set +e
          npm run check-model-drift
          code=$?
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then
            echo "::error::check-model-drift could not run (no candidate snapshot)."
            exit 1
          fi

      - name: Commit and push if model availability changed
        env:
          GH_TOKEN: ${{ github.token }}
        if: steps.check_drift.outputs.code == '1'
        run: |
          if [ -n "$(git status --porcelain cache)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add cache
            git commit -m "chore: refresh model-availability cache ($(date -u +%Y-%m-%dT%H-%M-%SZ))"
            git push
            gh workflow run deploy-pages.yml --ref main
          else
            echo "No cache changes to commit."
          fi

      - name: Report no change
        if: steps.check_drift.outputs.code == '0'
        run: echo "Model availability facts unchanged — nothing to commit."
